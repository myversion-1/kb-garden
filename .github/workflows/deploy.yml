name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout kb-garden
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout private KB-GH
        uses: actions/checkout@v4
        with:
          repository: myversion-1/-
          token: ${{ secrets.KB_GH_PAT }}
          path: kb-gh-source
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync content from KB-GH
        run: node sync.js
        env:
          KB_GH_SOURCE: ${{ github.workspace }}/kb-gh-source

      - name: Verify synced content
        run: ls -la content/ | head -20

      - name: Build Quartz
        run: npx quartz build --verbose --gitignore false
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
